name: opencode

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午8点 (UTC 0:00) 触发
  workflow_dispatch: # 添加手动触发
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  check-upstream:
    name: Check Upstream for Updates
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for updates
        id: check
        run: |
          git remote add upstream https://github.com/WildKernels/OnePlus_KernelSU_SUSFS.git
          git fetch upstream main
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          echo "Local commit: $LOCAL_COMMIT"
          echo "Upstream commit: $UPSTREAM_COMMIT"
          
          # Check if upstream is ahead
          if ! git merge-base --is-ancestor $UPSTREAM_COMMIT $LOCAL_COMMIT; then
            echo "Upstream has new commits."
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new updates from upstream."
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

  opencode:
    name: Run Opencode Agent
    needs: [check-upstream]
    # 如果是定时或手动触发，只有在检查到有更新时才运行；否则如果是评论触发则直接运行
    if: |
      always() && 
      (
        (needs.check-upstream.result == 'success' && needs.check-upstream.outputs.has_updates == 'true') ||
        (github.event_name == 'issue_comment' && (contains(github.event.comment.body, ' /oc') || startsWith(github.event.comment.body, '/oc') || contains(github.event.comment.body, ' /opencode') || startsWith(github.event.comment.body, '/opencode'))) ||
        (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, ' /oc') || startsWith(github.event.comment.body, '/oc') || contains(github.event.comment.body, ' /opencode') || startsWith(github.event.comment.body, '/opencode')))
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: xiaomi-token-plan-cn/mimo-v2-pro
          # 在 schedule 或 workflow_dispatch 触发时，注入 prompt 和合并指南
          prompt: >
            ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'Check for upstream repository modifications from https://github.com/WildKernels/OnePlus_KernelSU_SUSFS. If there are new updates, merge them into the current branch, resolve any conflicts if necessary, and create a Pull Request. YOU MUST STRICTLY FOLLOW THESE MERGE GUIDELINES:
            
            # 项目维护与上游合并指南 (OnePlus_KernelSU_SUSFS)
            本项目是基于 WildKernels 的分支，但在核心逻辑和 Root 方案选择上保持了独立性。在执行 `git merge upstream/main` 时，必须严格遵守以下准则。

            ## 🚫 核心禁忌 (Strictly Forbidden)
            1. 拒绝 Normalize 方案
            * 背景：上游引入了一套基于 `ksu_options_normalized` 的矩阵生成逻辑。
            * 要求：禁止 在 `.github/workflows/build-kernel-release.yml` 中引入任何包含 `normalized` 关键字的代码。
            * 坚持：保持现有的 `set-matrix` 逻辑，即通过 `inputs.ksu_type` 手动选择分发的模式。
            2. 拒绝 KernelSU-Next (KSUN)
            * 背景：我们已将核心 Root 方案转向 ReSukiSU。
            * 要求：禁止 在 `.github/actions/action.yml` (或相关的 build scripts) 的 `ksu_type` 选项中加入 `KSUN`。
            * 坚持：核心 Root 方案必须仅保留 `KSU` 和 `ReSukiSU`。

            ## ✅ 允许合并的内容 (Allowed to Merge)
            * 设备配置：`configs/` 目录下的新设备 JSON 文件（如 OP13, OP15 等）。
            * 新功能特性：如 `lxc_ds` (Droidspaces/LXC 支持)、`HMBIRD` 优化等功能性补丁。
            * 性能优化：上游在 `set-op-model` 任务中引入的 GraphQL API 解析 hash 的逻辑（提速解析）。
            * 编译器更新：对 Clang/Rust 工具链的路径优化或版本更新。

            ## 🛠️ 合并后的检查清单 (Post-Merge Checklist)
            每次执行合并后，必须运行以下命令进行审计，如果不符合预期，请立即修正代码并提交：
            1. 审计 ksu_type：`grep "KSUN" .github/actions/action.yml` 或 `build-kernel-release.yml`，预期结果：无匹配。
            2. 审计 Normalize 逻辑：`grep "normalized" .github/workflows/build-kernel-release.yml`，预期结果：无匹配。
            3. 审计 ReSukiSU 完整性：确保 action.yml 中 Add ReSukiSU 的步骤未被删除，且 README.md 中的项目描述未被上游覆盖。

            ## 📢 沟通准则
            本项目优先保障 ReSukiSU 的兼容性与原有的工作流逻辑，任何破坏此平衡的上游更改都应在合并后立即手动剔除或还原。' || '' }}

  set-matrix:
    name: Generate Test Matrix
    if: github.event_name == 'pull_request' && github.event.pull_request.user.type == 'Bot'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i+1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done
          echo "]" >> matrix.json
          
          # Only test a small subset or specific required matrix logic.
          # Here we test ALL configs found.
          filtered=$(jq -c '.' matrix.json)
          wrapped=$(jq -n --argjson items "$filtered" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"

  test-build:
    name: Build (${{ matrix.model }}, ${{ matrix.os_version }}, ${{ matrix.kernel_version }})
    needs: [set-matrix]
    runs-on: ubuntu-latest
    continue-on-error: true # Let all tests finish, report at the end
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Minimal Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 bc dos2unix kmod libdw-dev elfutils pigz jq

      - name: Prepare op_config_json
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc --argjson m '${{ toJSON(matrix) }}' '$m')" >> "$GITHUB_OUTPUT"

      - name: Test Build Kernel
        id: build
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ steps.prepare_config.outputs.config_json }}
          ksu_type: "ReSukiSU"
          ksu_branch_or_hash: "main"
          # Mock SUSFS branch/hash based on android version since it's just a test
          susfs_commit_hash_or_branch: "gki-${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          optimize_level: "O2"
          build_timestamp: ""
          clean: true
          debug: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  report-test-result:
    name: Report and Auto-Fix
    needs: [test-build]
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.user.type == 'Bot'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Send TG Progress (Start)
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          STATUS="${{ needs.test-build.result }}"
          MSG="🤖 <b>Opencode PR Test Build Finished</b>%0A"
          MSG="${MSG}<b>Result:</b> ${STATUS}%0A"
          MSG="${MSG}<b>PR:</b> <a href=\"${{ github.event.pull_request.html_url }}\">#${{ github.event.pull_request.number }}</a>"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="${MSG}"

      - name: Run opencode to fix build
        if: needs.test-build.result != 'success'
        uses: anomalyco/opencode/github@latest
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: xiaomi-token-plan-cn/mimo-v2-pro
          prompt: "The matrix test build failed for one or more devices. Please check the GitHub Actions logs for the failed 'test-build' jobs to identify the compilation errors. Fix the code to resolve these compilation errors and push the updates to the PR branch."

      - name: Fail the workflow
        if: needs.test-build.result != 'success'
        run: exit 1
